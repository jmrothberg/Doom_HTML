<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JMR's DOOM Game</title>
    <link rel="icon" type="image/png" href="assets/weapons/doom/pistol_0.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="gameContainer">
        <div id="gameTitle">JMR's Multiplayer DOOM</div>
        <canvas id="gameCanvas"></canvas>
        <div id="hud"></div>
        <!-- Added mobile controls for iPhones and iPads -->
        <div id="mobileControls">
            <div id="dpad">
                <button id="btn-up" class="controlButton">↑</button>
                <div id="horizontal-buttons">
                    <button id="btn-left" class="controlButton">←</button>
                    <button id="btn-right" class="controlButton">→</button>
                </div>
                <button id="btn-down" class="controlButton">↓</button>
            </div>
            <button id="btn-shoot" class="controlButton shootButton">Shoot</button>
            <button id="btn-weapon" class="controlButton">Weapon</button>
            <div id="gameOverControls" style="display: none;">
                <button id="btn-restart" class="controlButton">Restart</button>
                <button id="btn-exit" class="controlButton">Exit</button>
            </div>
        </div>
    </div>
    <!-- Import the main.js module that sets up the game after assets load -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>
